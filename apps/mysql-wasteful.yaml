apiVersion: apps/v1
kind: Deployment

metadata:
  name: mysql
  namespace: database


spec:
  replicas: 1

  selector:
    matchLabels:
      app: mysql

  template:
    metadata:
      labels:
        app: mysql

    spec:
      containers:
      - name: mysql

        image: mysql:8.0

        env:
        - name: MYSQL_ROOT_PASSWORD
          value: root123

        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"

          limits:
            cpu: "1"
            memory: "1Gi"
