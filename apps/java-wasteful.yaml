apiVersion: apps/v1
kind: Deployment

metadata:
  name: java-app
  namespace: backend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: java-app

  template:
    metadata:
      labels:
        app: java-app

    spec:
      containers:
      - name: java-app

        image: springio/gs-spring-boot-docker

        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"

          limits:
            cpu: "1"
            memory: "1Gi"
