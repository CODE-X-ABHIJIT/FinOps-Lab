apiVersion: apps/v1
kind: Deployment

metadata:
  name: redis
  namespace: backend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: redis

  template:
    metadata:
      labels:
        app: redis

    spec:
      containers:
      - name: redis
        image: redis

        resources:
           requests:
            cpu: "100m"
            memory: "128Mi"

           limits:
            cpu: "500m"
            memory: "512Mi"
